<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arte Español por el Mundo</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1>Arte Español por el Mundo</h1>
            <p>Descubre dónde se encuentran expuestas las obras maestras de nuestros pintores fuera de nuestras fronteras.</p>
        </div>
        <div class="header-controls">
            <button id="loadDataBtn" class="btn-primary">Cargar Obras de Arte <span class="loader hidden" id="spinner"></span></button>
        </div>
    </header>

    <main class="map-container">
        <!-- Contenedor del mapa de Leaflet -->
        <div id="map"></div>
    </main>

    <footer class="app-footer">
        <p>Práctica 7 - Web Semántica y Social | Juan Martos Cuevas</p>
    </footer>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Custom App JS -->
    <script src="app.js"></script>
</body>
</html>
